<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-DRAMA WATCHED</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap');

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:'Quicksand', sans-serif;
}

body{
  /* Ginawang Pure Black gaya ng index */
  background:#000000; 
  color:#ffffff;
  min-height:100vh;
}

.app-bar{
  padding:40px 25px 25px;
  text-align:center;
  background:#000000; /* Match sa index profile header */
  border-bottom:1px solid #1f1f1f;
}

.app-bar h1{
  font-size:22px;
  letter-spacing:3px;
  font-weight:600;
  text-transform: uppercase;
}

.rating-row{
  margin-top:12px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
  font-size:13px;
  opacity:0.7;
}

.sort-btn{
  background:rgba(17,17,17,0.6);
  border:1px solid #1f1f1f;
  padding:6px 12px;
  border-radius:10px;
  cursor:pointer;
  font-size:12px;
  color: white;
  transition: 0.3s;
}

.sort-btn:hover {
  background: #1a1a1a;
}

.content{
  padding:20px;
  max-width:600px;
  margin:auto;
}

/* DRAMA CARD: Ginayang 'Card' style ng index */
.drama-card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background: rgba(17,17,17,0.6); /* Semi-transparent */
  border:1px solid #1f1f1f;
  border-radius:18px;
  padding:18px 20px;
  margin-bottom:15px;
  color:#ffffff;
  transition:0.3s ease;
  backdrop-filter: blur(8px); /* Blur effect mula sa index */
  box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

.drama-card:hover{
  transform:translateY(-4px);
  background:#1a1a1a;
  border-color: #333;
}

.title{
  font-size:15px;
  letter-spacing:0.5px;
  font-weight: 500;
}

.rating{
  font-weight:600;
  padding:6px 12px;
  border-radius:12px;
  background: rgba(15,15,15,0.8);
  border:1px solid #1f1f1f;
  font-size:13px;
  color: #ffb400; /* Gold color para magmukhang premium rating */
}
</style>
</head>

<body>

<div class="app-bar">
  <h1>K-DRAMA WATCHED</h1>
  <div class="rating-row">
    <span id="countText"></span>
    <div class="sort-btn" onclick="toggleSort()">Sort ↑↓</div>

<div class="content">

let highFirst = true;
const dramaList = document.getElementById("dramaList");
const countText = document.getElementById("countText");

countText.textContent = dramas.length + " K-Dramas • Personal Ratings";

function renderList(){
  dramaList.innerHTML = "";

  dramas.sort((a,b)=>{
    return highFirst ? b.rating - a.rating : a.rating - b.rating;
  });

  dramas.forEach(drama=>{
    // Pinalitan ng div para hindi na clickable
    const card = document.createElement("div");
    card.className = "drama-card";

    // Dinagdag ang /10 sa rating
    card.innerHTML=`
      <div class="title">${drama.title}</div>
      <div class="rating">★ ${drama.rating}/10</div>
    `;

    dramaList.appendChild(card);
  });
}

function toggleSort(){
  highFirst = !highFirst;
  renderList();
}

renderList();
</script>
