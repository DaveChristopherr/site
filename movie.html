<!DOCTYPE html>

<title>DEVXDAVE Movies</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap');

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:'Quicksand', sans-serif;
}

body{
  /* Pure Black background gaya ng main index */
  background:#000000; 
  color:#ffffff;
  min-height:100vh;
}

/* TOP BAR */
.app-bar{
  padding:40px 25px 25px;
  text-align:center;
  background:#000000;
  border-bottom:1px solid #1f1f1f;
}

.app-bar h1{
  font-size:20px;
  letter-spacing:2px;
  font-weight:600;
  text-transform: uppercase;
}

.rating-row{
  margin-top:12px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
  font-size:13px;
  opacity:0.7;
}

.sort-btn{
  background:rgba(17,17,17,0.6);
  border:1px solid #1f1f1f;
  padding:6px 12px;
  border-radius:10px;
  cursor:pointer;
  font-size:12px;
  color: white;
  transition: 0.3s;
}

.sort-btn:hover{
  background:#1a1a1a;
}

/* CONTENT */
.content{
  padding:20px;
  max-width:600px;
  margin:auto;
}

/* CARD: Glassmorphism style mula sa index.html */
.card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background: rgba(17,17,17,0.6);
  border:1px solid #1f1f1f;
  border-radius:18px;
  padding:18px 20px;
  margin-bottom:15px;
  box-shadow:0 8px 25px rgba(0,0,0,0.4);
  transition:0.3s ease;
  color:#ffffff;
  backdrop-filter: blur(8px);
}

.card:hover{
  transform:translateY(-4px);
  background:#1a1a1a;
  border-color: #333;
}

.title{
  font-size:14px;
  letter-spacing:0.5px;
  font-weight: 500;
}

.rating{
  font-weight:600;
  padding:6px 12px;
  border-radius:12px;
  background: rgba(15,15,15,0.8);
  border:1px solid #1f1f1f;
  font-size:13px;
  color: #ffb400; /* Gold color rating gaya ng sa Books */
}

.footer{
  text-align:center;
  font-size:11px;
  opacity:0.5;
  margin-top:30px;
  padding-bottom: 20px;
  letter-spacing: 1px;
}
</style>
</head>

<body>

let highFirst = true;

const itemList = document.getElementById("itemList");
const countText = document.getElementById("countText");

countText.textContent = items.length + " Titles • Personal Ratings";

function renderList(){
  itemList.innerHTML = "";

  items.sort((a,b)=>{
    return highFirst ? b.rating - a.rating : a.rating - b.rating;
  });

  items.forEach(item=>{
    const card = document.createElement("div");
    card.className = "card";

    // Dinagdag ko yung "/10" sa tabi ng ${item.rating}
    card.innerHTML=`
      <div class="title">${item.title}</div>
      <div class="rating">★ ${item.rating}/10</div>
    `;

    itemList.appendChild(card);
  });
}

function toggleSort(){
  highFirst = !highFirst;
  renderList();
}
